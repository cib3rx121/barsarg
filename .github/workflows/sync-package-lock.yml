# Sem npm no PC: GitHub → Actions → "Sync package-lock" → Run workflow.
# Isto corre `npm install` na nuvem e faz commit do package-lock.json no main.
name: Sync package-lock

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: npm install (atualiza lockfile)
        run: npm install

      - name: Commit se houver alteracoes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --staged --quiet && echo "Nada a commitar." || (git commit -m "chore: sincronizar package-lock.json" && git push)
