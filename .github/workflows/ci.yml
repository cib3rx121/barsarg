# Corre na nuvem (GitHub Actions) — util para quem nao tem Node na rede corporativa.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Acoes JS oficiais em Node 24 (deprecacao do Node 20 nos runners).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Prisma generate + Next build nao precisam de Postgres real; so precisam de URL valida.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      ADMIN_USERNAME: ci
      ADMIN_PASSWORD: ci
      PUBLIC_CONSULT_PIN: "0000"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
